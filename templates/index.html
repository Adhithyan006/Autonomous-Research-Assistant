<!DOCTYPE html>
<html>
<head>
    <title>ScholarFlow AI</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:50px;
        }

        input{
            width:60%;
            padding:12px;
            font-size:18px;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            background:#38bdf8;
            border:none;
            margin-top:10px;
            cursor:pointer;
        }

        .box{
            margin-top:30px;
            background:#020617;
            padding:20px;
            border-radius:10px;
        }
    </style>

</head>

<body>

<h1>ScholarFlow AI</h1>
<h3>Research Assistant using Qwen</h3>

<form method="post">

    <input type="text" name="query" placeholder="Ask your research question..." required>

    <br><br>

    <button>Search</button>

</form>


{% if answer %}

<div class="box">

<h3>Answer:</h3>

<p>{{answer}}</p>

</div>

{% endif %}

</body>
</html>
